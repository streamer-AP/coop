name: omao_app
description: OMAO v2 - Bluetooth device companion app with Live2D interaction
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0

  # Local Database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # Audio
  just_audio: ^0.9.43
  audio_service: ^0.18.17
  audio_session: ^0.1.21
  on_audio_query: ^2.9.0
  permission_handler: ^11.3.1
  flutter_lyric: ^2.0.4+6

  # File Import
  file_picker: ^8.1.6
  archive: ^4.0.2
  flutter_pdfview: ^1.3.2

  # Bluetooth
  flutter_blue_plus: ^1.35.3

  # Crypto
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # URL
  url_launcher: ^6.3.1

  # Utils
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^10.1.4
  flutter_svg: ^2.0.17
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.19.1
  logger: ^2.5.0

  # Image
  image_picker: ^1.1.2

  # QR Scanner
  mobile_scanner: ^6.0.2

  # Storage
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.3
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
  assets:
    - assets/avatars/
    - assets/figma/auth/
    - assets/figma/components/
    - assets/figma/components/home_menu/
    - assets/figma/components/tab_bar/
    - assets/figma/home/
    - assets/figma/player/
    - assets/figma/icons/
  fonts:
    - family: Alegreya Sans
      fonts:
        - asset: assets/fonts/alegreya_sans/AlegreyaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/alegreya_sans/AlegreyaSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/alegreya_sans/AlegreyaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/alegreya_sans/AlegreyaSans-Bold.ttf
          weight: 700
    - family: SourceHanSansCN
      fonts:
        - asset: assets/fonts/source_han_sans/SourceHanSansCN-Light.otf
          weight: 300
        - asset: assets/fonts/source_han_sans/SourceHanSansCN-Regular.otf
          weight: 400
        - asset: assets/fonts/source_han_sans/SourceHanSansCN-Medium.otf
          weight: 500
        - asset: assets/fonts/source_han_sans/SourceHanSansCN-Bold.otf
          weight: 700
