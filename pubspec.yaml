name: omao_app
description: OMAO v2 - Bluetooth device companion app with Live2D interaction
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0

  # Local Database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # Audio
  just_audio: ^0.9.43
  audio_service: ^0.18.17
  audio_session: ^0.1.21

  # File Import
  file_picker: ^8.1.6
  archive: ^4.0.2
  ffmpeg_kit_flutter_audio: ^6.0.3

  # Bluetooth
  flutter_blue_plus: ^1.35.3

  # Crypto
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # Utils
  path_provider: ^2.1.5
  path: ^1.9.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  intl: ^0.19.0
  collection: ^1.19.1
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.3
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
